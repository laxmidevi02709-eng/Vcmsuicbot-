services:
  - type: worker
    name: tg-vc-music-bot
    env: docker
    plan: free
    autoDeploy: true
    envVars:
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: BOT_TOKEN
        sync: false
      - key: SESSION_STRING
        sync: false
      - key: START_IMAGE
        sync: false
